{% extends "base.html" %}

{% block content %}
<section class="panel">
    <h1>Edit Product</h1>
    <form class="stack" method="post">
        <label>
            Product name
            <input name="name" value="{{ product.name }}" required>
        </label>
        <label>
            Product page URL
            <input type="url" name="url" value="{{ product.url }}" required>
        </label>
        <label>
            Target price
            <input type="number" step="0.01" min="0" name="target_price" value="{{ product.target_price if product.target_price is not none }}">
        </label>
        <label>
            Big drop percent
            <input type="number" step="0.1" min="0" name="big_drop_percent" value="{{ product.big_drop_percent if product.big_drop_percent is not none }}">
        </label>
        <label class="check-row">
            <input type="checkbox" name="notify_on_target" {% if product.notify_on_target %}checked{% endif %}>
            Tell me when it reaches the target price
        </label>
        <label class="check-row">
            <input type="checkbox" name="notify_on_big_drop" {% if product.notify_on_big_drop %}checked{% endif %}>
            Tell me when there is a big drop
        </label>
        <label>
            Status
            <select name="status">
                <option value="active" {% if product.status == "active" %}selected{% endif %}>Active</option>
                <option value="paused" {% if product.status == "paused" %}selected{% endif %}>Paused</option>
            </select>
        </label>
        <div class="button-row">
            <button class="primary-button" type="submit">Save Changes</button>
            <a class="secondary-button" href="{{ url_for('product_detail', product_id=product.id) }}">Cancel</a>
        </div>
    </form>
</section>

<section class="danger-zone">
    <form action="{{ url_for('toggle_product', product_id=product.id) }}" method="post">
        <button class="secondary-button" type="submit">
            {% if product.status == "paused" %}Resume Product{% else %}Pause Product{% endif %}
        </button>
    </form>
    <form action="{{ url_for('delete_product', product_id=product.id) }}" method="post" data-confirm="Delete this product?">
        <button class="danger-button" type="submit">Delete Product</button>
    </form>
</section>
{% endblock %}
