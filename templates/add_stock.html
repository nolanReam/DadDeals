{% extends "base.html" %}

{% block content %}
<section class="panel">
    <h1>Add Stock</h1>
    <form class="stack" method="post">
        <label>
            Company name
            <input name="company_name" value="{{ form.get('company_name', '') }}" required>
        </label>
        <label>
            Ticker
            <input name="ticker" value="{{ form.get('ticker', '') }}" required maxlength="12" placeholder="Example: AAPL">
        </label>
        <label>
            Target price
            <input type="number" step="0.01" min="0" name="target_price" value="{{ form.get('target_price', '') if form.get('target_price') is not none }}" placeholder="Example: 150.00">
        </label>
        <label>
            Daily drop percent
            <input type="number" step="0.1" min="0" name="daily_drop_percent" value="{{ form.get('daily_drop_percent', '') if form.get('daily_drop_percent') is not none }}" placeholder="Example: 5">
        </label>
        <label>
            Daily rise percent
            <input type="number" step="0.1" min="0" name="daily_rise_percent" value="{{ form.get('daily_rise_percent', '') if form.get('daily_rise_percent') is not none }}" placeholder="Example: 5">
        </label>
        <label class="check-row">
            <input type="checkbox" name="notify_on_target" {% if form.get('notify_on_target', 1) %}checked{% endif %}>
            Tell me when it reaches the target price
        </label>
        <label class="check-row">
            <input type="checkbox" name="notify_on_big_drop" {% if form.get('notify_on_big_drop', 0) %}checked{% endif %}>
            Tell me when there is a big daily drop
        </label>
        <label>
            Status
            <select name="status">
                <option value="active" {% if form.get('status', 'active') == 'active' %}selected{% endif %}>Active</option>
                <option value="paused" {% if form.get('status') == 'paused' %}selected{% endif %}>Paused</option>
            </select>
        </label>
        <div class="button-row">
            <button class="primary-button" type="submit">Save Stock</button>
            <a class="secondary-button" href="{{ url_for('dashboard') }}">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
