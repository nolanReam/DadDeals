{% extends "base.html" %}

{% block content %}
<section class="panel">
    <h1>Add Product</h1>
    <form class="stack" method="post">
        <label>
            Product name
            <input name="name" required>
        </label>
        <label>
            Product page URL
            <input type="url" name="url" required>
        </label>
        <label>
            Target price
            <input type="number" step="0.01" min="0" name="target_price" placeholder="Example: 49.99">
        </label>
        <label>
            Big drop percent
            <input type="number" step="0.1" min="0" name="big_drop_percent" placeholder="Example: 20">
        </label>
        <label class="check-row">
            <input type="checkbox" name="notify_on_target" checked>
            Tell me when it reaches the target price
        </label>
        <label class="check-row">
            <input type="checkbox" name="notify_on_big_drop">
            Tell me when there is a big drop
        </label>
        <label>
            Status
            <select name="status">
                <option value="active">Active</option>
                <option value="paused">Paused</option>
            </select>
        </label>
        <div class="button-row">
            <button class="primary-button" type="submit">Save Product</button>
            <a class="secondary-button" href="{{ url_for('dashboard') }}">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
