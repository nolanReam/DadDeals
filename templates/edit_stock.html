{% extends "base.html" %}

{% block content %}
<section class="panel">
    <h1>Edit Stock</h1>
    <form class="stack" method="post">
        <label>
            Company name
            <input name="company_name" value="{{ form.get('company_name', stock.company_name) }}" required>
        </label>
        <label>
            Ticker
            <input name="ticker" value="{{ form.get('ticker', stock.ticker) }}" required maxlength="12">
        </label>
        <label>
            Target price
            <input type="number" step="0.01" min="0" name="target_price" value="{{ form.get('target_price', stock.target_price) if form.get('target_price', stock.target_price) is not none }}">
        </label>
        <label>
            Daily drop percent
            <input type="number" step="0.1" min="0" name="daily_drop_percent" value="{{ form.get('daily_drop_percent', stock.daily_drop_percent) if form.get('daily_drop_percent', stock.daily_drop_percent) is not none }}">
        </label>
        <label>
            Daily rise percent
            <input type="number" step="0.1" min="0" name="daily_rise_percent" value="{{ form.get('daily_rise_percent', stock.daily_rise_percent) if form.get('daily_rise_percent', stock.daily_rise_percent) is not none }}">
        </label>
        <label>
            Check this stock every
            <select name="stock_check_interval_minutes">
                {% set stock_interval = form.get('stock_check_interval_minutes', stock.stock_check_interval_minutes) %}
                <option value="1" {% if stock_interval == 1 %}selected{% endif %}>1 minute</option>
                <option value="5" {% if stock_interval == 5 %}selected{% endif %}>5 minutes</option>
                <option value="15" {% if stock_interval == 15 %}selected{% endif %}>15 minutes</option>
                <option value="30" {% if stock_interval == 30 %}selected{% endif %}>30 minutes</option>
                <option value="60" {% if stock_interval == 60 %}selected{% endif %}>60 minutes</option>
            </select>
        </label>
        <label class="check-row">
            <input type="checkbox" name="notify_on_target" {% if form.get('notify_on_target', stock.notify_on_target) %}checked{% endif %}>
            Tell me when it reaches the target price
        </label>
        <label class="check-row">
            <input type="checkbox" name="notify_on_big_drop" {% if form.get('notify_on_big_drop', stock.notify_on_big_drop) %}checked{% endif %}>
            Tell me when there is a big daily drop
        </label>
        <label>
            Status
            <select name="status">
                <option value="active" {% if form.get('status', stock.status) == "active" %}selected{% endif %}>Active</option>
                <option value="paused" {% if form.get('status', stock.status) == "paused" %}selected{% endif %}>Paused</option>
            </select>
        </label>
        <div class="button-row">
            <button class="primary-button" type="submit">Save Changes</button>
            <a class="secondary-button" href="{{ url_for('stock_detail', stock_id=stock.id) }}">Cancel</a>
        </div>
    </form>
</section>

<section class="danger-zone">
    <div class="danger-copy">
        <h2>Pause or Delete</h2>
        <p class="muted">Pausing keeps this stock saved but stops future checks. Delete removes it from DadDeals.</p>
    </div>
    <form action="{{ url_for('toggle_stock', stock_id=stock.id) }}" method="post">
        <button class="secondary-button" type="submit">
            {% if stock.status == "paused" %}Resume Stock{% else %}Pause Stock{% endif %}
        </button>
    </form>
    <form action="{{ url_for('delete_stock', stock_id=stock.id) }}" method="post" data-confirm="Delete this stock from DadDeals?">
        <button class="danger-button" type="submit">Delete Stock</button>
    </form>
</section>
{% endblock %}
